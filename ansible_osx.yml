- hosts: localhost
  tasks:
    - name: Install homebrew
      include_role:
        name: geerlingguy.mac.homebrew

    - name: Make sure homebrew bin is in path
      ansible.builtin.lineinfile:
        path: /etc/paths
        state: present
        line: "/opt/homebrew/bin"
      become: true
      become_user: root

    - name: Install core packages via brew casks
      community.general.homebrew_cask:
        name: "{{ item }}"
      ignore_errors: yes
      with_items:
        - alfred
        - vanilla
        - rocket
        - cleanmymac
        - figma
        - google-chrome
        - slack
        - visual-studio-code
        - cursor
        - vlc
        - zoom
        - rectangle
        - jetbrains-toolbox
        - warp
        - orbstack
        - notion
        - notion-calendar
        - font-jetbrains-mono
        - postman

    - name: "Install homebrew packages"
      community.general.homebrew:
        name:
          [
            "autoconf",
            "automake",
            "bat",
            "coreutils",
            "curl",
            "gnu-time",
            "gpg",
            "htop",
            "imagemagick",
            "libtool",
            "libxslt",
            "libyaml",
            "jq",
            "mas",
            "openssl",
            "git",
            "gh",
            "pkg-config",
            "readline",
            "sqlite3",
            "tmux",
            "unzip",
            "vim",
            "zlib",
            "zsh",
          ]
        state: present
        update_homebrew: yes

    - name: "Install from Mac app store"
      shell: mas install {{ item }}
      with_items:
        - 497799835 # xcode

    - name: Accept Xcode license
      become: true
      changed_when: true
      shell: sudo xcodebuild -license accept

    - name: Setup ZSH and Oh My ZSH
      import_tasks: tasks/common/zsh.yml

    - name: Setup mise
      import_tasks: tasks/common/mise.yml

    - name: Setup pnpm
      import_tasks: tasks/common/pnpm.yml

    - name: Create a default ZSH configuration
      template:
        src: templates/.zshrc.j2
        dest: /Users/{{ lookup('env', 'USER') }}/.zshrc
        owner: "{{ lookup('env', 'USER') }}"
        force: yes

    - name: Create a default VSCode configuration
      template:
        src: templates/vscode-settings.json.j2
        dest: /Users/{{ lookup('env', 'USER') }}/Library/Application Support/Code/User/settings.json
        owner: "{{ lookup('env', 'USER') }}"
        force: yes

    - name: Create a default VSCode keybinding configuration
      template:
        src: templates/vscode-keybindings.json.j2
        dest: /Users/{{ lookup('env', 'USER') }}/Library/Application Support/Code/User/keybindings.json
        owner: "{{ lookup('env', 'USER') }}"
        force: yes

    - name: Ensure .claude directory exists
      file:
        path: /Users/{{ lookup('env', 'USER') }}/.claude
        state: directory
        owner: "{{ lookup('env', 'USER') }}"

    - name: Create Claude Code settings
      template:
        src: templates/claude-settings.json.j2
        dest: /Users/{{ lookup('env', 'USER') }}/.claude/settings.json
        owner: "{{ lookup('env', 'USER') }}"
        force: yes
